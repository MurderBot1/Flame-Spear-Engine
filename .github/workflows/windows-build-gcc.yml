name: gcc-windows-build

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  gcc-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install compiler (MinGW GCC)
        run: |
          choco install mingw -y
          g++ --version
