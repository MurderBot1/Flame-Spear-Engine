name: Python Formatter

on:
  push:
    branches: [ dev ]
  pull_request:

jobs:
  black:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Black
        run: pip install black

      - name: Run Black on all Python files
        run: |
          echo "Running Black on entire repository"
          black --config formatting/guides/black-format.toml .

      - name: Commit Black formatting changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Apply Black formatting"
          branch: ${{ github.head_ref || github.ref_name }}