name: Shell Formatter

on:
  push:
    branches: [ dev ]
  pull_request:

jobs:
  shfmt:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install latest shfmt
        run: |
          curl -sSLo shfmt https://github.com/mvdan/sh/releases/latest/download/shfmt_Linux_x86_64
          chmod +x shfmt
          sudo mv shfmt /usr/local/bin/shfmt

      - name: Format all shell scripts
        run: |
          echo "Formatting all .sh files"
          # If you want custom settings, put flags here:
          # Example: shfmt -w -i 2 -bn -ci .
          shfmt -w .

      - name: Commit formatting changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Apply shfmt formatting"
          # Use the correct branch depending on event type
          branch: ${{ github.event.pull_request.head.ref || github.ref_name }}
